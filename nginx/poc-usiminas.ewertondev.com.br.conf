# =============================================================================
#  Nginx — Configuração do domínio poc-usiminas.ewertondev.com.br
#
#  Arquivo: /etc/nginx/sites-available/poc-usiminas.ewertondev.com.br
#           (ou /etc/nginx/conf.d/poc-usiminas.ewertondev.com.br.conf)
#
#  Para ativar (padrão Debian/Ubuntu):
#    ln -s /etc/nginx/sites-available/poc-usiminas.ewertondev.com.br \
#           /etc/nginx/sites-enabled/poc-usiminas.ewertondev.com.br
#    nginx -t && systemctl reload nginx
#
#  Ajuste os caminhos de certificado se necessário.
# =============================================================================

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name poc-usiminas.ewertondev.com.br;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name poc-usiminas.ewertondev.com.br;

    # ── Certificados ──────────────────────────────────────────────────────────
    # Ajuste os caminhos abaixo para os certificados reais no servidor.
    # Caminhos comuns:
    #   Let's Encrypt : /etc/letsencrypt/live/poc-usiminas.ewertondev.com.br/
    #   Manual        : /etc/nginx/ssl/ ou /etc/ssl/
    ssl_certificate     /etc/letsencrypt/live/poc-usiminas.ewertondev.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poc-usiminas.ewertondev.com.br/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Logs separados para este domínio ─────────────────────────────────────
    access_log  /var/log/nginx/poc-usiminas.ewertondev.com.br.access.log;
    error_log   /var/log/nginx/poc-usiminas.ewertondev.com.br.error.log warn;

    # ── Tamanho máximo do corpo da requisição ─────────────────────────────────
    client_max_body_size 50m;

    # ── Proxy reverso para a aplicação Next.js ────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket / upgrade de conexão
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Cabeçalhos de proxy
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
